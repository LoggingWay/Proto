syntax = "proto3";

package combat_events;
option go_package = "gen/combat_events";
option csharp_namespace = "LoggingWayPlugin.Proto";

// Main combat event message
//Combat event should map to a game event happening either via packet receive or as part
//of the game processing it
message CombatEvent {
  int64 timestamp_epoch_ms = 1;
  Entity source = 2;
  Entity target = 3;
  EventSnapshot source_snapshot = 4;
  EventSnapshot target_snapshot = 5;
  // Discriminated union using oneof
  oneof event_data {
    StatusEffectData status_effect = 10;
    HoTData hot = 11;
    DoTData dot = 12;
    DamageTakenData damage_taken = 13;
    HealedData healed = 14;
    DeathData death = 15;
    EncounterStartData encounter_start = 16;
    EncounterEndData encounter_end = 17;
    ZoneChangeData zone_change = 18;
    PlayerEnterCombat player_join = 19;
  }
}

message Entity {
  uint64 gameobject_id = 1;
  uint32 base_id = 2;
  ObjectKind objectkind = 3;
}
message EventSnapshot {
  uint32 current_hp = 1;
  uint32 max_hp = 2;
  repeated StatusEffectSnapshot status_effects = 3;
  uint32 barrier_percent = 4;
}

message StatusEffectSnapshot {
  uint32 id = 1;
  uint32 source_id = 2;
  uint32 stack_count = 3;
}

// Event-specific data types
message StatusEffectData {
  uint32 id = 1;
  uint32 stack_count = 2;
  uint32 icon = 3;  // 0 means null
  float duration = 4;
  StatusCategory category = 5;
}

message HoTData {
  uint32 amount = 1;
}

message DoTData {
  uint32 amount = 1;
}

message DamageTakenData {
  uint32 amount = 1;
  uint32 action_id = 2;
  bool crit = 3;
  bool direct_hit = 4;
  DamageType damage_type = 5;
  ActionType display_type = 6;
  bool parried = 7;
  bool blocked = 8;
  uint32 icon = 9;  // 0 means null
  bool main_target = 10;
}

message HealedData {
  uint32 amount = 1;
  uint32 action_id = 2;
  bool crit = 3;
  uint32 icon = 4;  // 0 means null
}

message DeathData {
  // Empty message for death events
}

message EncounterStartData {
  uint32 territorytype = 1;
}

message EncounterEndData {
  uint32 territorytype = 1;
  EncounterEndKind reason = 2;
}

message ZoneChangeData{
    uint32 territorytype = 1;
}


/* =======================
   Utility
   ======================= */
//Utility messages does not map to a game event
//They are used to help the backend parser and prevent certain field that only needs to be known once

message PlayerEnterCombat{
  string name = 1;
  uint32 homeworld_id = 2;;
  uint64 content_id = 3;
  uint64 gameobject_id = 4;
  uint32 job_id = 5;
  uint32 level = 6;
  uint32 attack_power = 7;
  uint32 skillspeed = 8;
  uint32 spellspeed = 9;
  uint32 tenacity = 10;
  uint32 determination = 11;
  uint32 criticalHit = 12;
  uint32 directHit = 13;

}
/* =======================
   Enums
   ======================= */

enum StatusCategory {
  STATUS_CATEGORY_NONE = 0;
  STATUS_CATEGORY_BENEFICIAL = 1;
  STATUS_CATEGORY_DETRIMENTAL = 2;
}

enum DamageType {
  DAMAGE_TYPE_UNKNOWN = 0;
  DAMAGE_TYPE_SLASHING = 1;
  DAMAGE_TYPE_PIERCING = 2;
  DAMAGE_TYPE_BLUNT = 3;
  DAMAGE_TYPE_SHOT = 4;
  DAMAGE_TYPE_MAGIC = 5;
  DAMAGE_TYPE_BREATH = 6;
  DAMAGE_TYPE_PHYSICAL = 7;
  DAMAGE_TYPE_LIMIT_BREAK = 8;
}

enum ActionType {
  ACTION_TYPE_NONE = 0;
  ACTION_TYPE_ACTION = 1;
  ACTION_TYPE_ITEM = 2;
  ACTION_TYPE_EVENT_ITEM = 3;
  ACTION_TYPE_EVENT_ACTION = 4;
  ACTION_TYPE_GENERAL_ACTION = 5;
  ACTION_TYPE_BUDDY_ACTION = 6;
  ACTION_TYPE_MAIN_COMMAND = 7;
  ACTION_TYPE_COMPANION = 8;
  ACTION_TYPE_CRAFT_ACTION = 9;
  ACTION_TYPE_UNK_10 = 10;
  ACTION_TYPE_PET_ACTION = 11;
  ACTION_TYPE_UNK_12 = 12;
  ACTION_TYPE_MOUNT = 13;
  ACTION_TYPE_PVP_ACTION = 14;
  ACTION_TYPE_FIELD_MARKER = 15;
  ACTION_TYPE_CHOCOBO_RACE_ABILITY = 16;
  ACTION_TYPE_CHOCOBO_RACE_ITEM = 17;
  ACTION_TYPE_UNK_18 = 18;
  ACTION_TYPE_BGC_ARMY_ACTION = 19;
  ACTION_TYPE_ORNAMENT = 20;
}

enum ObjectKind
{
    None = 0;
    Player = 1;
    BattleNpc = 2;//for our purposes others values past 3 should be impossible,but who knows...
    EventNpc = 3;
    Treasure = 4;
    Aetheryte = 5;
    GatheringPoint = 6;
    EventObj = 7;
    MountType = 8;
    Companion = 9;
    Retainer = 10;
    Area = 11;
    Housing = 12;
    Cutscene = 13;
    CardStand = 14;
    Ornament = 15;
}

//past this line, non game related Enums
enum EncounterEndKind
{
  Clear = 0;
  Wipe = 1;

}


//rpc
service Loggingway {

//generate a xivauth redirect
rpc GetXivAuthRedirect (GetXivAuthRedirectRequest) returns (GetXivAuthRedirectReply) {}
//client send a code from xivauth, gets a sessionID
rpc Login (LoginRequest) returns (LoginReply) {}

rpc CreateNewReport (NewReportRequest) returns (NewReportReply) {}

rpc EncounterIngest (NewEncounterRequest) returns (NewEncounterReply) {}

rpc GetMyCharacters (GetMyCharactersRequest) returns (GetMyCharactersReply) {}
rpc GetMyReports (GetMyReportsRequest) returns (GetMyReportsReply) {}
rpc GetMyEncounters (GetMyEncountersRequest) returns (GetMyEncountersReply) {}
rpc GetEncountersStats (GetEncountersStatsRequest) returns (GetEncountersStatsReply) {}
rpc EnrollCharacters (EnrollCharactersRequest) returns (EnrollCharactersReply) {}
rpc CombatEventIngest(stream combat_events.CombatEvent) returns (CombatEventIngestReturn) {}

}

//Declared in order, Request > Reply
message GetXivAuthRedirectRequest{
    
}

message GetXivAuthRedirectReply{
    string xivauthuri = 1;//state is included in the uri
}

message LoginRequest{
    string code = 1;
    string state = 2;
}

message LoginReply{
    string sessionID = 1;
}

message NewReportRequest{
    uint32 visbility = 1;
}

message NewReportReply{
    int64 reportid = 1;
}

message NewEncounterRequest{
    int64 report_id = 1;
    repeated combat_events.CombatEvent events = 2;
}

message NewEncounterReply{
    uint32 code =1;
}

message GetMyCharactersRequest {
    //sessionID is included as metadata anyway
}
message GetMyCharactersReply{
    repeated Character characters = 1;
}

message GetMyReportsRequest{
    //saaaaaame
}
message GetMyReportsReply{
    repeated Report reports = 1;
}
message GetMyEncountersRequest{
    uint32 zone_id = 1;//if this is 0, return the last 20 encounters regardless of zone
}
message GetMyEncountersReply{
    repeated Encounter encounters = 1;
}
message GetEncountersStatsRequest{
    int64 encounter_id = 1;
}
message GetEncountersStatsReply{
    repeated EncounterPlayerBreakdown playerstats = 1;
}
message EnrollCharactersRequest{

}
message EnrollCharactersReply{
  
}
//types
message Character{
    string name = 1;
    string homeworld = 2;
    string datacenter = 3;
    string persistent_key = 4;
    uint32 visbility = 5;
}

message Report{
    int64 report_id = 1;
    string report_name = 2;
    repeated Encounter encounters = 3;
}
message Encounter{
    int64 encounter_id = 1;
    uint32 zone_id = 2;
    int64 uploaded_at = 3;
}

message EncounterPlayerBreakdown{
    string name = 1;
    int64 total_damage = 2;
    int64 total_healing = 3;

    int64 total_hits = 4;
    int64 total_crits = 5;
    int64 total_direct_hits = 6;
    float duration = 7;

    float dps =8;
    float hps =9;
    float crit_rate =10;
    float dh_rate =11;
}
message CombatEventIngestReturn{
  uint32 code = 1;
}
